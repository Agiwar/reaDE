# Database connection configurations
# Copy to configuration/local/db_config.yaml and fill in real values

databases:
  my_sqlite:
    type: sqlite
    path: /path/to/your/database.db
    timeout: 5000  # milliseconds (optional)

  my_postgres:
    type: postgresql
    host: localhost
    port: 5432
    database: my_database
    username: my_user
    password: ${DB_PASSWORD}  # use env var for secrets

  my_mysql:
    type: mysql
    host: localhost
    port: 3306
    database: my_database
    username: my_user
    password: ${DB_PASSWORD}
