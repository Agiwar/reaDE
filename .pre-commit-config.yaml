# Pre-commit hooks configuration
# See https://pre-commit.com for more information

repos:
  # Project-env hooks: same tool versions as CI (uv.lock), no rev skew
  - repo: local
    hooks:
      - id: ruff
        name: ruff (project env)
        entry: uv run ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff-format (project env)
        entry: uv run ruff format
        language: system
        types: [python]
      - id: mypy
        name: mypy (project env)
        entry: uv run mypy src tests
        language: system
        types: [python]
        pass_filenames: false
      - id: bandit
        name: bandit (project env)
        entry: uv run bandit -c pyproject.toml -r src
        language: system
        types: [python]
        pass_filenames: false

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending

  # Check for secrets
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: |
          (?x)^(
            .*\.lock\.json$|
            .*\.env\.example$|
            tests/fixtures/.*
          )$
