[project]
name = "reade"
version = "0.1.0"
description = "A data engineering SDK providing unified interfaces for database connections, config loading, and validation"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Jeffrey Li", email = "agiwar791005@gmail.com" }]
keywords = ["data-engineering", "database-connectors", "python-sdk"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Database",
]

dependencies = [
    # Configuration
    "pydantic>=2.5.0",
    "pydantic-settings>=2.1.0",
    "pyyaml>=6.0",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
dev = [
    # Testing
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",

    # Linting & formatting
    "ruff>=0.8.0",
    "mypy>=1.7.0",
    "bandit[toml]>=1.7.5",

    # Pre-commit
    "pre-commit>=3.6.0",

    # Type stubs
    "types-pyyaml>=6.0.0",
]

# DB connectors (install as needed)
postgres = ["sqlalchemy>=2.0.0", "psycopg2-binary>=2.9.0"]
mysql = ["sqlalchemy>=2.0.0", "pymysql>=1.1.0"]

[project.urls]
Homepage = "https://github.com/Agiwar/reaDE"
Repository = "https://github.com/Agiwar/reaDE"
Issues = "https://github.com/Agiwar/reaDE/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/reade"]

[tool.hatch.build.targets.sdist]
include = ["src/reade"]

# ==================== RUFF ====================
[tool.ruff]
target-version = "py310"
line-length = 88
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E", "W", "F", "I", "N", "D", "UP",
    "ANN", "TC", "S", "B", "A", "C4",
    "T10", "ISC", "PIE", "T20", "PT",
    "Q", "RET", "SIM", "ARG", "PTH",
    "PL", "C90", "TRY", "EM", "PERF",
    "RUF",
]
ignore = [
    "D203", "D213",
    "ANN401", "TRY003", "EM101", "EM102",
    "PLR0913", "PLR2004",
]
fixable = ["ALL"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "ARG", "D", "ANN"]
"__init__.py" = ["D104"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.isort]
known-first-party = ["reade"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

# ==================== MYPY ====================
[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
strict_equality = true
pretty = true
show_error_codes = true

plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

# ==================== PYTEST ====================
[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = ["-ra", "--strict-markers"]
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
]

# ==================== BANDIT ====================
[tool.bandit]
exclude_dirs = ["tests", "build", "dist", ".venv", ".pyvenv*"]
skips = ["B101"]

# ==================== PYDANTIC ====================
[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true
