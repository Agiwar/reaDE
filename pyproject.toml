[project]
name = "reade"
version = "0.1.0"
description = "A data engineering SDK providing unified interfaces for database connections, config loading, and validation - eliminating boilerplate"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Jeffrey Li", email = "agiwar791005@gmail.com" }]
maintainers = [{ name = "Jeffrey Li", email = "agiwar791005@gmail.com" }]
keywords = [
    "data-engineering",
    "data-tools",
    "database-connectors",
    "sql",
    "python-sdk",
    "configuration-management",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Database",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    # Core data processing
    "pandas>=2.0.0",
    "polars>=0.20.0",
    "pyarrow>=14.0.0",

    # Database connectors
    "sqlalchemy>=2.0.0",
    "psycopg2-binary>=2.9.0",    # PostgreSQL
    "pymysql>=1.1.0",            # MySQL

    # Configuration & validation
    "pydantic>=2.5.0",
    "pydantic-settings>=2.1.0",
    "pyyaml>=6.0",
    "python-dotenv>=1.0.0",

    # Template engine
    "jinja2>=3.1.0",

    # Logging
    "structlog>=23.2.0",

    # Utilities
    "python-dateutil>=2.8.0",
]

[project.optional-dependencies]
dev = [
    # Testing
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "pytest-asyncio>=0.21.0",
    "pytest-mock>=3.12.0",
    "pytest-xdist>=3.5.0",     # Parallel test execution
    "pytest-timeout>=2.2.0",   # Test timeout
    "pytest-benchmark>=4.0.0", # Performance benchmarking
    "hypothesis>=6.92.0",      # Property-based testing

    # Linting & formatting
    "ruff>=0.6.0",
    "mypy>=1.7.0",
    "bandit[toml]>=1.7.5",
    "sqlfluff>=3.0.0",
    "sourcery>=1.16.0",    # AI-powered code review & refactoring

    # Code quality & documentation coverage
    "interrogate>=1.5.0", # Docstring coverage checker
    "vulture>=2.10",      # Find dead code
    "radon>=6.0.1",       # Code complexity metrics

    # Security scanning
    "safety>=3.0.0",    # Check for known vulnerabilities
    "pip-audit>=2.6.0", # Audit dependencies

    # Pre-commit hooks
    "pre-commit>=3.6.0",

    # Type stubs
    "types-pyyaml>=6.0.0",
    "types-toml>=0.10.0",
    "types-python-dateutil>=2.8.0",
    "pandas-stubs>=2.0.0",
    "types-sqlalchemy>=1.4.0",

    # Documentation
    "mkdocs>=1.5.0",
    "mkdocs-material>=9.5.0",
    "mkdocstrings[python]>=0.24.0",
    "mkdocs-gen-files>=0.5.0",      # Generate files for docs
    "mkdocs-literate-nav>=0.6.0",   # Literate navigation

    # Build tools
    "build>=1.0.0",
    "twine>=4.0.0",
]

# MVP analytics engine (pick one for now)
trino = ["trino>=0.328.0"]

# Future connectors (uncomment when implemented)
# oracle = ["cx-oracle>=8.3.0"]
# db2 = ["ibm-db>=3.2.0"]
# clickhouse = ["clickhouse-connect>=0.6.0"]
# snowflake = ["snowflake-connector-python>=3.6.0", "snowflake-sqlalchemy>=1.5.0"]
# spark = ["pyspark>=3.5.0"]
# dbt = ["dbt-core>=1.7.0", "dbt-postgres>=1.7.0"]

[project.urls]
Homepage = "https://github.com/Agiwar/reaDE"
Documentation = "https://github.com/Agiwar/reaDE#readme"
Repository = "https://github.com/Agiwar/reaDE"
Issues = "https://github.com/Agiwar/reaDE/issues"
Changelog = "https://github.com/Agiwar/reaDE/releases"

[project.scripts]
reade = "reade.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/reade"]

[tool.hatch.build.targets.sdist]
include = ["src/reade"]

# py.typed is already in src/reade/ and included automatically

# ==================== RUFF CONFIGURATION ====================
[tool.ruff]
target-version = "py310"
line-length = 88
indent-width = 4
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    # Core Python quality
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "N",  # pep8-naming
    "D",  # pydocstyle (Google-style docstrings)
    "UP", # pyupgrade - modern Python syntax

    # Type annotations & safety
    "ANN", # flake8-annotations - enforce type hints
    "TC",  # flake8-type-checking, new prefix

    # Async & concurrency
    "ASYNC", # flake8-async

    # Security (critical for SDK)
    "S", # flake8-bandit (security)

    # Code quality & bugs
    "B",   # flake8-bugbear
    "A",   # flake8-builtins
    "C4",  # flake8-comprehensions
    "T10", # flake8-debugger
    "ISC", # flake8-implicit-str-concat
    "PIE", # flake8-pie
    "T20", # flake8-print
    "PT",  # flake8-pytest-style
    "Q",   # flake8-quotes
    "RET", # flake8-return
    "SIM", # flake8-simplify
    "ARG", # flake8-unused-arguments
    "PTH", # flake8-use-pathlib

    # Complexity & maintainability
    "PL",  # pylint
    "C90", # mccabe

    # Error handling
    "TRY", # tryceratops
    "EM",  # flake8-errmsg

    # Performance
    "PERF", # perflint
    "FURB", # refurb

    # Documentation & logging
    "G",   # flake8-logging-format
    "LOG", # flake8-logging

    # Data engineering specific
    "PD",  # pandas-vet
    "NPY", # numpy

    # Import management
    "TID", # flake8-tidy-imports

    # Ruff-specific
    "RUF", # ruff-specific rules
]

ignore = [
    # Docstring formatting conflicts
    "D203", # one-blank-line-before-class (conflicts with D211)
    "D213", # multi-line-summary-second-line (conflicts with D212)

    # Type annotation rules (removed from Ruff, safe to remove from ignore list)
    # "ANN101",  # missing-type-self (REMOVED FROM RUFF)
    # "ANN102",  # missing-type-cls (REMOVED FROM RUFF)

    # Flexibility for SDK design
    "ANN401", # dynamically-typed-expression (Any) - needed for generic SDK interfaces
    "TRY003", # avoid-specifying-long-messages-outside-exception-class - verbose for SDK
    "EM101",  # raw-string-in-exception - allow inline error messages
    "EM102",  # f-string-in-exception - allow f-strings in exceptions

    # Complexity rules that may be too strict for data engineering patterns
    "PLR0913", # too-many-arguments - data engineering often needs many params
    "PLR2004", # magic-value-comparison - allow magic numbers for data thresholds
]

fixable = ["ALL"]
unfixable = []
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = [
    "S101", # allow assert in tests
    "ARG",  # allow unused args (fixtures, etc.)
    "D",    # no docstring requirements in tests
    "ANN",  # no type-hint enforcement in tests
]
"__init__.py" = ["D104"]
"examples/**/*.py" = ["D", "T20"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.isort]
known-first-party = ["reade"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
docstring-code-format = true

# ==================== MYPY CONFIGURATION ====================
[tool.mypy]
python_version = "3.10"

# Strict mode (equivalent to --strict)
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
disallow_untyped_calls = true
disallow_untyped_decorators = true
disallow_any_generics = true
disallow_subclassing_any = true
check_untyped_defs = true

# Additional strict checks
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_unreachable = true
strict_equality = true
strict_concatenate = true

# Error output
pretty = true
show_error_codes = true
show_column_numbers = true
show_error_context = true

# Platform & imports
platform = "linux"
follow_imports = "normal"

# Performance
incremental = true
cache_dir = ".mypy_cache"

# Plugins for common libraries
plugins = ["pydantic.mypy", "sqlalchemy.ext.mypy.plugin"]

# Per-module overrides for untyped third-party libraries
[[tool.mypy.overrides]]
module = [
    "polars.*",
    # Optional db connectors (when installed)
    "cx_oracle.*",
    "trino.*",
    "ibm_db.*",
    "clickhouse_connect.*",
]
ignore_missing_imports = true

# Relax strictness for tests
[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false
disallow_untyped_calls = false

# ==================== PYTEST CONFIGURATION ====================
[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-ra",
    "--strict-markers",
    "--showlocals",
    "--cov=src",
    "--cov-report=term-missing:skip-covered",
    "--cov-report=html",
    "--cov-report=xml",
]
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
    "slow: Slow running tests",
    "db: Tests requiring database connection",
]

[tool.coverage.run]
source = ["src"]
branch = true
omit = ["*/tests/*", "*/__init__.py", "*/examples/*"]

[tool.coverage.report]
precision = 2
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]

# ==================== BANDIT CONFIGURATION ====================
[tool.bandit]
exclude_dirs = ["tests", "build", "dist", ".venv", ".pyenv3.13"]
skips = [
    "B101", # assert_used - we use asserts in tests (handled via exclude_dirs)
]

# Security checks for data engineering
tests = [
    "B201", # flask_debug_true
    "B301", # pickle usage (security risk)
    "B302", # marshal usage
    "B303", # MD5 hash usage
    "B304", # Insecure cipher
    "B305", # Insecure cipher mode
    "B306", # Insecure mktemp usage
    "B307", # eval usage
    "B308", # mark_safe usage
    # B309 removed - not a valid bandit test
    "B310", # urllib urlopen
    "B311", # random usage for cryptography
    "B312", # telnetlib usage
    "B313", # XML parsing vulnerabilities
    "B314", # XML parsing vulnerabilities
    "B315", # XML parsing vulnerabilities
    "B316", # XML parsing vulnerabilities
    "B317", # XML parsing vulnerabilities
    "B318", # XML parsing vulnerabilities
    "B319", # XML parsing vulnerabilities
    "B320", # XML parsing vulnerabilities
    "B321", # FTP usage
    "B323", # Unverified SSL context
    "B324", # hashlib insecure hash functions
    "B325", # tempfile usage
    "B401", # import_telnetlib
    "B402", # import_ftplib
    "B403", # import_pickle
    "B404", # import_subprocess
    "B405", # import_xml_etree
    "B406", # import_xml_sax
    "B407", # import_xml_expat
    "B408", # import_xml_minidom
    "B409", # import_xml_pulldom
    "B410", # import_lxml
    "B411", # import_xmlrpclib
    "B413", # import_pycrypto
    "B501", # request_with_no_cert_validation
    "B502", # ssl_with_bad_version
    "B503", # ssl_with_bad_defaults
    "B504", # ssl_with_no_version
    "B505", # weak_cryptographic_key
    "B506", # yaml_load
    "B507", # ssh_no_host_key_verification
    "B601", # paramiko_calls
    "B602", # subprocess_popen_with_shell_equals_true
    "B603", # subprocess_without_shell_equals_true
    "B604", # any_other_function_with_shell_equals_true
    "B605", # start_process_with_a_shell
    "B606", # start_process_with_no_shell
    "B607", # start_process_with_partial_path
    "B608", # hardcoded_sql_expressions
    "B609", # linux_commands_wildcard_injection
    "B610", # django_extra_used
    "B611", # django_rawsql_used
    "B701", # jinja2_autoescape_false
    "B702", # use_of_mako_templates
    "B703", # django_mark_safe
]

# ==================== SQLFLUFF CONFIGURATION ====================
[tool.sqlfluff.core]
dialect = "postgres"
templater = "jinja"
max_line_length = 88

[tool.sqlfluff.indentation]
indent_unit = "space"
tab_space_size = 4

[tool.sqlfluff.rules.capitalisation]
extended_capitalisation_policy = "upper"

# ==================== INTERROGATE CONFIGURATION ====================
# Docstring coverage checker
[tool.interrogate]
ignore-init-method = true
ignore-init-module = false
ignore-magic = false
ignore-semiprivate = false
ignore-private = false
ignore-property-decorators = false
ignore-module = false
ignore-nested-functions = false
ignore-nested-classes = false
ignore-setters = false
fail-under = 95.0
exclude = ["setup.py", "docs", "build", "tests"]
ignore-regex = ["^get$", "^post$", "^put$", "^delete$"]
ext = []
style = "google"
verbose = 1
quiet = false
whitelist-regex = []
color = true
omit-covered-files = false

# ==================== PYDANTIC CONFIGURATION ====================
[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true
warn_untyped_fields = true

# ==================== RADON CONFIGURATION ====================
# Code complexity metrics
# Run with: radon cc src -a -nb
# Cyclomatic Complexity grades:
# A: 1-5 (simple)
# B: 6-10 (well structured)
# C: 11-20 (needs attention)
# D: 21-50 (complex)
# E: 51-100 (very complex)
# F: >100 (unmaintainable)

# ==================== VULTURE CONFIGURATION ====================
# Dead code finder
[tool.vulture]
exclude = ["tests/", "docs/", ".venv/", ".pyenv3.13/"]
ignore_decorators = ["@app.route", "@require_*"]
ignore_names = ["visit_*", "do_*"]
make_whitelist = true
min_confidence = 80
paths = ["src"]
sort_by_size = true
verbose = false
