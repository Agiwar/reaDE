name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: lint, type-check, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Create venv and install project (editable, with dev extras)
        run: |
          uv venv --python 3.12 .venv
          uv pip install -e ".[dev]"

      - name: Put venv on PATH for subsequent steps
        run: echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Lint (ruff)
        run: make lint

      - name: Type check (mypy strict)
        run: make type-check

      - name: Tests (pytest)
        run: make test
