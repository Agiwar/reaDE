name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: lint, type-check, test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: reade
          POSTGRES_PASSWORD: reade  # pragma: allowlist secret — throwaway test-container credential
          POSTGRES_DB: reade
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U reade"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      mysql:
        image: mysql:8.4
        env:
          MYSQL_USER: reade
          MYSQL_PASSWORD: reade  # pragma: allowlist secret — throwaway test-container credential
          MYSQL_DATABASE: reade
          MYSQL_ROOT_PASSWORD: reade  # pragma: allowlist secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -preade --silent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
    env:
      READE_TEST_POSTGRES_HOST: 127.0.0.1
      READE_TEST_MYSQL_HOST: 127.0.0.1
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install project + dev dependencies (locked)
        run: uv sync --extra dev --frozen

      - name: Lint (ruff)
        run: make lint

      - name: Type check (mypy strict)
        run: make type-check

      - name: Tests (pytest)
        run: make test

      - name: Integration tests ran (not skipped)
        run: uv run pytest -m integration -rs | grep -E "[1-9][0-9]* passed"

      - name: End-to-end example
        run: uv run python examples/end_to_end.py

      - name: Typed-config example
        run: uv run python examples/config_typed.py

      - name: Config module coverage gate (>=90%)
        run: uv run pytest --cov=reade.config --cov-fail-under=90 -q
