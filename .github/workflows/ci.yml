name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: lint, type-check, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install project + dev dependencies (locked)
        run: uv sync --extra dev --frozen

      - name: Lint (ruff)
        run: make lint

      - name: Type check (mypy strict)
        run: make type-check

      - name: Tests (pytest)
        run: make test

      - name: End-to-end example
        run: uv run python examples/end_to_end.py
